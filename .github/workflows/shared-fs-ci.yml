name: Shared FS CI

on:
    pull_request:
        paths:
            - ".github/workflows/shared-fs-ci.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/shared-fs/**"
    push:
        branches: [master]
        paths:
            - ".github/workflows/shared-fs-ci.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/shared-fs/**"
    workflow_dispatch:

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    portable:
        name: Portable shared-fs tests (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Use Bash for pnpm scripts on Windows
              if: runner.os == 'Windows'
              run: pnpm config set script-shell "C:\\Program Files\\Git\\bin\\bash.exe"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build shared-fs packages
              run: pnpm -r --sort --filter @peerbit/shared-fs --filter @peerbit/shared-fs-cli run build

            - name: Test shared-fs library
              run: pnpm --filter @peerbit/shared-fs run test

            - name: Test shared-fs CLI
              run: pnpm --filter @peerbit/shared-fs-cli run test

    format:
        name: Shared-fs formatting
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm exec prettier --check packages/shared-fs

    native-adapter:
        name: Native adapter checks (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Go
              uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
              with:
                  go-version: "1.24.x"
                  cache-dependency-path: packages/shared-fs/native/go.sum

            - name: Install Linux FUSE headers
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y fuse3 libfuse3-dev
                  sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

            - name: Test portable native adapter IPC
              working-directory: packages/shared-fs/native
              run: go test ./...

            - name: Build Linux native adapter
              if: runner.os == 'Linux'
              working-directory: packages/shared-fs/native
              run: go test -tags "native_mount fuse3" ./...

            - name: Build Windows native adapter
              if: runner.os == 'Windows'
              working-directory: packages/shared-fs/native
              env:
                  CGO_ENABLED: "0"
              run: go test -tags native_mount ./...
