name: Shared FS CI

on:
    pull_request:
        paths:
            - ".github/workflows/shared-fs-ci.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/shared-fs/**"
    push:
        branches: [master]
        paths:
            - ".github/workflows/shared-fs-ci.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/shared-fs/**"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    portable:
        name: Portable shared-fs tests (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build shared-fs packages
              run: pnpm -r --sort --filter @peerbit/shared-fs --filter @peerbit/shared-fs-cli run build

            - name: Test shared-fs library
              run: pnpm --filter @peerbit/shared-fs run test

            - name: Test shared-fs CLI
              run: pnpm --filter @peerbit/shared-fs-cli run test

    format:
        name: Shared-fs formatting
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm exec prettier --check packages/shared-fs
