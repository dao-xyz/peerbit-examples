name: Validate Cloudflare hosting

on:
    pull_request:
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: cloudflare-examples-${{ github.ref }}
    cancel-in-progress: false

jobs:
    validate:
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22.x

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Install locked Wrangler toolchain
              run: |
                  npm ci --no-audit --no-fund --prefix tools/wrangler
                  node scripts/validate-wrangler-toolchain.mjs

            - name: Validate production bootstrap sources
              run: |
                  node scripts/validate-production-bootstrap.mjs
                  node --test cloudflare/*.test.mjs

            - name: Build every frontend
              env:
                  COMMIT_HASH: ${{ github.sha }}
              run: |
                  export SHORT_SHA="${GITHUB_SHA::7}"
                  pnpm run build

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Smoke-test every hosted frontend
              run: pnpm run test:hosted-apps

            - name: Prepare and validate Cloudflare assets
              env:
                  COMMIT_HASH: ${{ github.sha }}
              run: |
                  node scripts/prepare-cloudflare-assets.mjs
                  node scripts/validate-owned-domains.mjs

            - name: Ensure the build did not mutate source
              run: git diff --exit-code

            - name: Validate every Worker bundle
              run: |
                  node scripts/render-cloudflare-configs.mjs --mode preview
                  for config in .wrangler-config/*.jsonc; do
                      output=".wrangler-dry-run/$(basename "$config" .jsonc)"
                      tools/wrangler/node_modules/.bin/wrangler versions upload \
                          --config "$config" \
                          --dry-run \
                          --outdir "$output"
                  done
