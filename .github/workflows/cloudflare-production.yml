name: Deploy Cloudflare production

on:
    workflow_dispatch:
        inputs:
            target:
                description: Production target to deploy
                required: true
                type: choice
                default: apps
                options:
                    - apps
                    - stream
                    - music
                    - chat
                    - giga
                    - ml
                    - text
                    - files
                    - chess
                    - legacy-redirect
                    - all
            confirm:
                description: Type deploy-peerbit-production
                required: true
                type: string

permissions:
    contents: read

concurrency:
    group: cloudflare-examples-production
    cancel-in-progress: false

jobs:
    validate:
        if: github.ref == 'refs/heads/master' && inputs.confirm == 'deploy-peerbit-production'
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22.x

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  run_install: false

            - name: Build and validate every frontend
              env:
                  COMMIT_HASH: ${{ github.sha }}
                  VITE_SUPABASE_AUTH_ENABLED: "false"
              run: |
                  pnpm install --frozen-lockfile
                  node scripts/validate-production-bootstrap.mjs
                  node scripts/validate-cloudflare-account-auth.mjs
                  node --test cloudflare/*.test.mjs
                  export SHORT_SHA="${GITHUB_SHA::7}"
                  pnpm run build
                  node scripts/validate-cloudflare-account-auth.mjs \
                      --dist packages/social-media-app/frontend/dist
                  node scripts/prepare-cloudflare-assets.mjs
                  node scripts/validate-owned-domains.mjs
                  git diff --exit-code
                  npm ci --ignore-scripts --no-audit --no-fund --prefix tools/wrangler
                  node scripts/render-cloudflare-configs.mjs --mode production
                  for config in .wrangler-config/*.jsonc; do
                      output=".wrangler-dry-run/$(basename "$config" .jsonc)"
                      tools/wrangler/node_modules/.bin/wrangler deploy \
                          --config "$config" \
                          --dry-run \
                          --outdir "$output"
                  done

    deploy-production:
        if: github.ref == 'refs/heads/master' && inputs.confirm == 'deploy-peerbit-production'
        needs: validate
        runs-on: ubuntu-24.04
        timeout-minutes: 90
        environment: cloudflare-production
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22.x

            - name: Setup pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  run_install: false

            - name: Rebuild without deployment credentials
              env:
                  COMMIT_HASH: ${{ github.sha }}
                  VITE_SUPABASE_AUTH_ENABLED: "false"
              run: |
                  pnpm install --frozen-lockfile
                  node scripts/validate-production-bootstrap.mjs
                  node scripts/validate-cloudflare-account-auth.mjs
                  node --test cloudflare/*.test.mjs
                  export SHORT_SHA="${GITHUB_SHA::7}"
                  pnpm run build
                  node scripts/validate-cloudflare-account-auth.mjs \
                      --dist packages/social-media-app/frontend/dist
                  node scripts/prepare-cloudflare-assets.mjs
                  node scripts/validate-owned-domains.mjs
                  git diff --exit-code
                  npm ci --ignore-scripts --no-audit --no-fund --prefix tools/wrangler
                  node scripts/render-cloudflare-configs.mjs --mode production

            - name: Install Chromium for transactional runtime checks
              if: inputs.target != 'legacy-redirect'
              run: >-
                  pnpm --dir packages/file-share/frontend exec playwright
                  install --with-deps chromium

            - name: Deploy, verify, and roll back each selected target
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PRODUCTION_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
                  DEPLOY_TARGET: ${{ inputs.target }}
                  DEPLOY_COMMIT: ${{ github.sha }}
                  PW_CLOUDFLARE_SMOKE: "1"
                  PW_BASE_URL: https://files.apps.peerbit.org
                  PW_GIGA_URL: https://giga.apps.peerbit.org
                  PW_STREAM_URL: https://stream.apps.peerbit.org
              run: >-
                  node scripts/deploy-cloudflare-production.mjs
                  --target "$DEPLOY_TARGET"
                  --commit "$DEPLOY_COMMIT"
