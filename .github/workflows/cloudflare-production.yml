name: Deploy Cloudflare production

on:
    workflow_dispatch:
        inputs:
            target:
                description: Production target to deploy
                required: true
                type: choice
                default: apps
                options:
                    - apps
                    - stream
                    - music
                    - chat
                    - ml
                    - text
                    - files
                    - chess
                    - all
            confirm:
                description: Type deploy-peerbit-production
                required: true
                type: string
permissions:
    contents: read

concurrency:
    group: cloudflare-examples-production
    cancel-in-progress: false

jobs:
    validate:
        if: github.ref == 'refs/heads/master' && inputs.confirm == 'deploy-peerbit-production'
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22.x

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Build every frontend
              env:
                  COMMIT_HASH: ${{ github.sha }}
              run: |
                  pnpm install --frozen-lockfile
                  npm ci --no-audit --no-fund --prefix tools/wrangler
                  node scripts/validate-wrangler-toolchain.mjs
                  node scripts/validate-production-bootstrap.mjs
                  node --test cloudflare/*.test.mjs
                  export SHORT_SHA="${GITHUB_SHA::7}"
                  pnpm run build

            - name: Install locked Chromium for hosted-app validation
              run: pnpm exec playwright install --with-deps chromium

            - name: Smoke-test every hosted app
              run: pnpm run test:hosted-apps

            - name: Validate Cloudflare production bundles
              env:
                  COMMIT_HASH: ${{ github.sha }}
              run: |
                  node scripts/prepare-cloudflare-assets.mjs
                  node scripts/validate-owned-domains.mjs
                  git diff --exit-code
                  node scripts/render-cloudflare-configs.mjs --mode production
                  for config in .wrangler-config/*.jsonc; do
                      output=".wrangler-dry-run/$(basename "$config" .jsonc)"
                      tools/wrangler/node_modules/.bin/wrangler versions upload \
                          --config "$config" \
                          --dry-run \
                          --outdir "$output"
                  done

    deploy-production:
        if: github.ref == 'refs/heads/master' && inputs.confirm == 'deploy-peerbit-production'
        needs: validate
        runs-on: ubuntu-24.04
        timeout-minutes: 90
        environment: cloudflare-production
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22.x

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Rebuild without deployment credentials
              env:
                  COMMIT_HASH: ${{ github.sha }}
              run: |
                  pnpm install --frozen-lockfile
                  npm ci --no-audit --no-fund --prefix tools/wrangler
                  node scripts/validate-wrangler-toolchain.mjs
                  node scripts/validate-production-bootstrap.mjs
                  node --test cloudflare/*.test.mjs
                  export SHORT_SHA="${GITHUB_SHA::7}"
                  pnpm run build
                  node scripts/prepare-cloudflare-assets.mjs
                  node scripts/validate-owned-domains.mjs
                  git diff --exit-code
                  node scripts/render-cloudflare-configs.mjs --mode production

            - name: Install Chromium for transactional runtime checks
              run: >-
                  pnpm --dir packages/file-share/frontend exec playwright
                  install --with-deps chromium

            - name: Deploy, verify, and roll back each selected target
              # The protected token needs Workers Scripts Read plus Zone Read
              # and Workers Routes Read across every account zone so routine
              # attachment fences can use authoritative per-zone route truth.
              # The protected zone fingerprint must be derived independently;
              # never derive it with this possibly permission-filtered token.
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PRODUCTION_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  CLOUDFLARE_ACCOUNT_ZONE_INVENTORY_SHA256: ${{ secrets.CLOUDFLARE_ACCOUNT_ZONE_INVENTORY_SHA256 }}
                  DEPLOY_TARGET: ${{ inputs.target }}
                  DEPLOY_COMMIT: ${{ github.sha }}
                  PW_CLOUDFLARE_SMOKE: "1"
                  PW_BASE_URL: https://files.apps.peerbit.org
                  PW_STREAM_URL: https://stream.apps.peerbit.org
              run: >-
                  node scripts/deploy-cloudflare-production.mjs
                  --target "$DEPLOY_TARGET"
                  --commit "$DEPLOY_COMMIT"
