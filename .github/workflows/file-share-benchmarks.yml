name: File Share Benchmarks

on:
    workflow_dispatch:
        inputs:
            scenario:
                description: Benchmark scenario
                required: true
                type: choice
                default: local
                options:
                    - local
                    - prod
            file_mb:
                description: File size in MiB
                required: true
                type: number
                default: 512
            runs:
                description: Number of benchmark runs
                required: true
                type: number
                default: 5
            reader_cohort:
                description: Reader benchmark cohort
                required: true
                type: choice
                default: live-replicator
                options:
                    - live-replicator
                    - cold-observer
                    - cold-persisted-read
            download_sink:
                description: Browser output sink (hash-only isolates Peerbit transfer; OPFS measures native browser persistence)
                required: true
                type: choice
                default: hash-only
                options:
                    - hash-only
                    - opfs
                    - node-file
            min_upload_mbps:
                description: Fail if median upload throughput is below this value (0 disables)
                required: true
                type: number
                default: 0
            min_download_mbps:
                description: Fail if median download throughput is below this value (0 disables)
                required: true
                type: number
                default: 0

permissions:
    contents: read

env:
    FILE_SHARE_BENCHMARK_BASE_URL: https://files.apps.peerbit.org

jobs:
    benchmark:
        runs-on: ubuntu-22.04
        timeout-minutes: 180
        concurrency:
            group: file-share-bench-${{ github.ref_name }}-${{ inputs.scenario }}-${{ inputs.file_mb }}-${{ inputs.download_sink }}
            cancel-in-progress: false

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Build file-share library
              run: pnpm --filter @peerbit/please-lib build

            - name: Run benchmark
              env:
                  PW_BENCH: "1"
                  PW_BENCH_SCENARIO: ${{ inputs.scenario }}
                  PW_READER_COHORT: ${{ inputs.reader_cohort }}
                  PW_DOWNLOAD_SINK: ${{ inputs.download_sink }}
                  PW_FILE_MB: ${{ inputs.file_mb }}
                  PW_BASE_URL: ${{ inputs.scenario == 'prod' && env.FILE_SHARE_BENCHMARK_BASE_URL || '' }}
              working-directory: packages/file-share/frontend
              run: |
                  mkdir -p "$GITHUB_WORKSPACE/bench-results"
                  for i in $(seq 1 "${{ inputs.runs }}"); do
                    echo "Starting file-share benchmark run $i/${{ inputs.runs }}"
                    export PW_RESULT_FILE="$GITHUB_WORKSPACE/bench-results/run-$i.json"
                    npx playwright test -c playwright.config.ts tests/transfer.bench.e2e.spec.ts --project chromium
                  done

            - name: Summarize results
              env:
                  BENCH_SCENARIO: ${{ inputs.scenario }}
                  BENCH_READER_COHORT: ${{ inputs.reader_cohort }}
                  BENCH_DOWNLOAD_SINK: ${{ inputs.download_sink }}
                  BENCH_FILE_MB: ${{ inputs.file_mb }}
                  BENCH_RUNS: ${{ inputs.runs }}
                  BENCH_MIN_UPLOAD_MBPS: ${{ inputs.min_upload_mbps }}
                  BENCH_MIN_DOWNLOAD_MBPS: ${{ inputs.min_download_mbps }}
              run: node scripts/summarize-file-share-benchmarks.mjs

            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: file-share-benchmark-${{ github.run_id }}
                  path: bench-results
                  retention-days: 7
