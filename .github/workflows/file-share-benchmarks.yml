name: File Share Benchmarks

on:
    workflow_dispatch:
        inputs:
            scenario:
                description: Benchmark scenario
                required: true
                type: choice
                default: local
                options:
                    - local
                    - prod
            file_mb:
                description: File size in MiB
                required: true
                type: number
                default: 1024
            runs:
                description: Exact paired-run contract (must be 2)
                required: true
                type: number
                default: 2
            reader_cohort:
                description: Reader benchmark cohort
                required: true
                type: choice
                default: cold-persisted-read
                options:
                    - live-replicator
                    - cold-observer
                    - cold-persisted-read
            download_sink:
                description: Browser output sink
                required: true
                type: choice
                default: hash-only
                options:
                    - hash-only
                    - opfs
                    - node-file
            min_upload_mbps:
                description: Unused by this temporary paired diagnostic
                required: true
                type: number
                default: 0
            min_download_mbps:
                description: Unused by this temporary paired diagnostic
                required: true
                type: number
                default: 0

permissions:
    contents: read

jobs:
    observer_root_persistence_pair:
        name: Exact 1 GiB observer-root persistence pair
        runs-on: ubuntu-22.04
        timeout-minutes: 180
        concurrency:
            group: fileshare-observer-root-persistence-pair-${{ github.ref_name }}
            cancel-in-progress: false
        env:
            BASE_CORE_COMMIT: 33b4aa4f054a3db2d301df41bab56cf5c77d367c
            HEAD_CORE_COMMIT: 33b4aa4f054a3db2d301df41bab56cf5c77d367c
            BASE_EXAMPLES_COMMIT: d3bcac49c1037e0a1d676be1bc7988163b677d73
            HEAD_EXAMPLES_COMMIT: 6e65ce9b69c83fa9f50026f57cd5499dfb2dc31d
            BASE_EXAMPLES_LOCK_SHA256: 7a306a1baaea4c1374674a56ffe6381e502915fd32670a9cd66814ce5fe114b1
            HEAD_EXAMPLES_LOCK_SHA256: 7a306a1baaea4c1374674a56ffe6381e502915fd32670a9cd66814ce5fe114b1
            EXPECTED_SHA256_BASE64: bvqiNpaxF0jivbi8SZBjuQ2/qU4wXlT+j22AhO6ywHU=
            EXPECTED_CRC32_HEX: 125fb916
            HARNESS_ROOT: ${{ github.workspace }}/harness
            BASE_CORE_ROOT: ${{ github.workspace }}/core-baseline
            BASE_EXAMPLES_SOURCE: ${{ github.workspace }}/examples-baseline
            HEAD_EXAMPLES_SOURCE: ${{ github.workspace }}/examples-head
            RESULTS_ROOT: ${{ github.workspace }}/evidence
            PREPARED_ROOT: /tmp/peerbit-fileshare-prepared
            NODE_OPTIONS: --no-warnings

        steps:
            - name: Initialize evidence directory
              run: |
                  set -euo pipefail
                  mkdir -p "$RESULTS_ROOT/logs"
                  date -u +%FT%TZ > "$RESULTS_ROOT/initialized-at.txt"

            - name: Validate exact invocation
              env:
                  FILE_MB: ${{ inputs.file_mb }}
                  PAIR_RUNS: ${{ inputs.runs }}
                  SCENARIO: ${{ inputs.scenario }}
                  READER_COHORT: ${{ inputs.reader_cohort }}
                  DOWNLOAD_SINK: ${{ inputs.download_sink }}
              run: |
                  set -euo pipefail
                  test "$FILE_MB" = "1024"
                  test "$PAIR_RUNS" = "2"
                  test "$SCENARIO" = "local"
                  test "$READER_COHORT" = "cold-persisted-read"
                  test "$DOWNLOAD_SINK" = "hash-only"

            - name: Reclaim ephemeral runner disk
              run: |
                  set -euo pipefail
                  cleanup_paths=(
                    /usr/share/dotnet
                    /usr/local/lib/android
                    /opt/ghc
                    /usr/local/.ghcup
                    /opt/hostedtoolcache/CodeQL
                  )
                  sudo rm -rf "${cleanup_paths[@]}"
                  df -h /

            - name: Checkout immutable head harness
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  repository: dao-xyz/peerbit
                  ref: ${{ env.HEAD_CORE_COMMIT }}
                  path: harness
                  fetch-depth: 1
                  persist-credentials: false

            - name: Checkout baseline core
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  repository: dao-xyz/peerbit
                  ref: ${{ env.BASE_CORE_COMMIT }}
                  path: core-baseline
                  fetch-depth: 1
                  persist-credentials: false

            - name: Checkout baseline examples source
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  repository: dao-xyz/peerbit-examples
                  ref: ${{ env.BASE_EXAMPLES_COMMIT }}
                  path: examples-baseline
                  fetch-depth: 1
                  persist-credentials: false

            - name: Checkout head examples source
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  repository: dao-xyz/peerbit-examples
                  ref: ${{ env.HEAD_EXAMPLES_COMMIT }}
                  path: examples-head
                  fetch-depth: 1
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  version: 10.26.1
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22

            - name: Verify immutable inputs
              run: |
                  set -euo pipefail
                  test "$(git -C "$HARNESS_ROOT" rev-parse HEAD)" = "$HEAD_CORE_COMMIT"
                  test "$(git -C "$BASE_CORE_ROOT" rev-parse HEAD)" = "$BASE_CORE_COMMIT"
                  test "$(git -C "$BASE_EXAMPLES_SOURCE" rev-parse HEAD)" = "$BASE_EXAMPLES_COMMIT"
                  test "$(git -C "$HEAD_EXAMPLES_SOURCE" rev-parse HEAD)" = "$HEAD_EXAMPLES_COMMIT"
                  test -z "$(git -C "$HARNESS_ROOT" status --porcelain)"
                  test -z "$(git -C "$BASE_CORE_ROOT" status --porcelain)"
                  test -z "$(git -C "$BASE_EXAMPLES_SOURCE" status --porcelain)"
                  test -z "$(git -C "$HEAD_EXAMPLES_SOURCE" status --porcelain)"
                  test "$(sha256sum "$BASE_EXAMPLES_SOURCE/pnpm-lock.yaml" | cut -d' ' -f1)" = "$BASE_EXAMPLES_LOCK_SHA256"
                  test "$(sha256sum "$HEAD_EXAMPLES_SOURCE/pnpm-lock.yaml" | cut -d' ' -f1)" = "$HEAD_EXAMPLES_LOCK_SHA256"

            - name: Install build and browser prerequisites
              run: |
                  set -euo pipefail
                  export PATH="$HOME/.cargo/bin:$PATH"
                  "$HARNESS_ROOT/scripts/ci/install-wasm-pack.sh"
                  rustup target add wasm32-unknown-unknown
                  pnpm dlx playwright@1.58.0 install --with-deps chromium

            - name: Record environment and paired order
              run: |
                  set -euo pipefail
                  mkdir -p "$RESULTS_ROOT/logs"
                  {
                    date -u +%FT%TZ
                    uname -a
                    lscpu
                    free -b
                    df -B1 /
                    pnpm --version
                    node --version
                  } > "$RESULTS_ROOT/environment.txt"
                  if (( GITHUB_RUN_ID % 2 == 0 )); then
                    printf 'head\nbaseline\n' > "$RESULTS_ROOT/order.txt"
                  else
                    printf 'baseline\nhead\n' > "$RESULTS_ROOT/order.txt"
                  fi
                  cat "$RESULTS_ROOT/order.txt"

            - name: Run exact paired benchmark
              env:
                  FILE_MB: ${{ inputs.file_mb }}
              run: |
                  set -uo pipefail
                  mkdir -p "$RESULTS_ROOT/logs"
                  overall=0
                  sequence=0

                  terminate_group() {
                    pgid="$1"
                    lifecycle_log="$2"
                    ps -eo pid,ppid,pgid,args |
                      awk -v pgid="$pgid" 'NR == 1 || $3 == pgid' >> "$lifecycle_log"
                    if kill -0 -- "-$pgid" 2>/dev/null; then
                      kill -TERM -- "-$pgid" 2>/dev/null || true
                      for _ in $(seq 1 10); do
                        if ! kill -0 -- "-$pgid" 2>/dev/null; then
                          break
                        fi
                        sleep 1
                      done
                    fi
                    if kill -0 -- "-$pgid" 2>/dev/null; then
                      kill -KILL -- "-$pgid" 2>/dev/null || true
                      sleep 1
                    fi
                    ps -eo pid,ppid,pgid,args |
                      awk -v pgid="$pgid" 'NR == 1 || $3 == pgid' >> "$lifecycle_log"
                    ! kill -0 -- "-$pgid" 2>/dev/null
                  }

                  run_variant() {
                    variant="$1"
                    sequence=$((sequence + 1))
                    if [[ "$variant" == "baseline" ]]; then
                      core_root="$BASE_CORE_ROOT"
                      core_commit="$BASE_CORE_COMMIT"
                      examples_source="$BASE_EXAMPLES_SOURCE"
                      examples_commit="$BASE_EXAMPLES_COMMIT"
                      examples_lock="$BASE_EXAMPLES_LOCK_SHA256"
                      reader_terminal_topology="replicator"
                    else
                      core_root="$HARNESS_ROOT"
                      core_commit="$HEAD_CORE_COMMIT"
                      examples_source="$HEAD_EXAMPLES_SOURCE"
                      examples_commit="$HEAD_EXAMPLES_COMMIT"
                      examples_lock="$HEAD_EXAMPLES_LOCK_SHA256"
                      reader_terminal_topology="observer"
                    fi
                    prepared="$PREPARED_ROOT-$sequence-$variant"
                    result_dir="$RESULTS_ROOT/$sequence-$variant"
                    summary_file="$RESULTS_ROOT/$sequence-$variant-summary.json"
                    log_file="$RESULTS_ROOT/logs/$sequence-$variant.log"
                    exit_file="$RESULTS_ROOT/$sequence-$variant-exit-code.txt"
                    disk_file="$RESULTS_ROOT/$sequence-$variant-disk.tsv"
                    disk_marker="$RESULTS_ROOT/$sequence-$variant-disk-abort.txt"

                    available="$(df --output=avail -B1 / | tail -1 | tr -d ' ')"
                    if (( available < 8589934592 )); then
                      printf 'insufficient pre-run disk: %s bytes\n' "$available" | tee "$disk_marker"
                      printf '125\n' > "$exit_file"
                      overall=1
                      return
                    fi

                    test "$(git -C "$core_root" rev-parse HEAD)" = "$core_commit"
                    test -z "$(git -C "$core_root" status --porcelain)"
                    printf 'captured_at\tavailable_bytes\tmemory_available_bytes\n' > "$disk_file"
                    sync
                    sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true

                    (
                      cd "$HARNESS_ROOT"
                      benchmark_args=(
                        scripts/file-share/run-file-share-benchmark.mjs
                        --scenario upload
                        --integration-mode link
                        --peerbit-root "$core_root"
                        --examples-root "$prepared"
                        --source "$examples_source"
                        --examples-ref "$examples_commit"
                        --peerbit-ref-label "$core_commit"
                        --expected-peerbit-commit "$core_commit"
                        --require-clean-peerbit
                        --expected-examples-commit "$examples_commit"
                        --expected-examples-lockfile-sha256 "$examples_lock"
                        --results-dir "$result_dir"
                        --summary-file "$summary_file"
                        --file-mb "$FILE_MB"
                        --runs 1
                        --mode fixed1
                        --network local
                        --fresh
                        --upload-timeout-ms 1800000
                        --download-timeout-ms 5400000
                        --download-sink hash-only
                        --post-upload-monitor-ms 5000
                        --poll-ms 1000
                        --min-ready-seeders 1
                        --ready-timeout-ms 300000
                        --sample-ms 15000
                        --sample-count 4
                        --target-seeders 2
                        --reader-local-chunk-target 1024
                        --reader-local-chunk-max-overshoot 0
                        --reader-terminal-topology "$reader_terminal_topology"
                        --fixture-seed peerbit-file-share-benchmark-v1
                      )
                      exec setsid timeout --signal=INT --kill-after=30s 75m node "${benchmark_args[@]}"
                    ) > >(tee "$log_file") 2>&1 &
                    benchmark_pid=$!
                    benchmark_pgid=""
                    for _ in $(seq 1 50); do
                      benchmark_pgid="$(
                        ps -o pgid= -p "$benchmark_pid" 2>/dev/null |
                          tr -d ' ' ||
                          true
                      )"
                      if [[ "$benchmark_pgid" == "$benchmark_pid" ]]; then
                        break
                      fi
                      if ! kill -0 "$benchmark_pid" 2>/dev/null; then
                        break
                      fi
                      sleep 0.1
                    done
                    if [[ -z "$benchmark_pgid" || "$benchmark_pgid" != "$benchmark_pid" ]]; then
                      printf 'benchmark process group isolation failed: pid=%s pgid=%s\n' "$benchmark_pid" "$benchmark_pgid" |
                        tee "$RESULTS_ROOT/$sequence-$variant-process-group-error.txt"
                      kill -TERM "$benchmark_pid" 2>/dev/null || true
                      wait "$benchmark_pid" 2>/dev/null || true
                      sleep 2
                      pkill -KILL -f "$prepared" 2>/dev/null || true
                      printf '126\n' > "$exit_file"
                      overall=1
                      printf '%s\n' "$overall" > "$RESULTS_ROOT/overall-run-status.txt"
                      exit 0
                    fi

                    (
                      while kill -0 "$benchmark_pid" 2>/dev/null; do
                        available="$(df --output=avail -B1 / | tail -1 | tr -d ' ')"
                        memory="$(awk '/MemAvailable:/ { print $2 * 1024 }' /proc/meminfo)"
                        printf '%s\t%s\t%s\n' "$(date -u +%FT%TZ)" "$available" "$memory" >> "$disk_file"
                        if (( available < 2147483648 )); then
                          printf 'disk watchdog stopped %s at %s available bytes\n' "$variant" "$available" | tee "$disk_marker"
                          kill -TERM -- "-$benchmark_pgid" 2>/dev/null || true
                          break
                        fi
                        sleep 15
                      done
                    ) &
                    monitor_pid=$!

                    set +e
                    wait "$benchmark_pid"
                    code=$?
                    set -e
                    kill "$monitor_pid" 2>/dev/null || true
                    wait "$monitor_pid" 2>/dev/null || true
                    printf '%s\n' "$code" > "$exit_file"
                    if (( code != 0 )); then
                      overall=1
                    fi

                    lifecycle_log="$RESULTS_ROOT/logs/$sequence-$variant-process-group.log"
                    if ! terminate_group "$benchmark_pgid" "$lifecycle_log"; then
                      printf 'benchmark process group survived cleanup: %s\n' "$benchmark_pgid" |
                        tee -a "$lifecycle_log"
                      overall=1
                    fi
                    rm -rf "$prepared"
                    rm -rf "$core_root/node_modules"
                    find "$core_root/packages" -type d -name dist -prune -exec rm -rf {} +
                    sync
                    {
                      free -b
                      df -B1 /
                    } >> "$RESULTS_ROOT/logs/$sequence-$variant-after-cleanup.log"
                  }

                  while IFS= read -r variant; do
                    run_variant "$variant"
                  done < "$RESULTS_ROOT/order.txt"
                  printf '%s\n' "$overall" > "$RESULTS_ROOT/overall-run-status.txt"
                  exit 0

            - name: Build paired comparison
              if: always()
              run: |
                  node --input-type=module <<'NODE'
                  import fs from "node:fs";
                  import path from "node:path";
                  import { isDeepStrictEqual } from "node:util";

                  const root = process.env.RESULTS_ROOT;
                  fs.mkdirSync(root, { recursive: true });
                  const expected = {
                    harness: process.env.HEAD_CORE_COMMIT,
                    baseline: process.env.BASE_CORE_COMMIT,
                    head: process.env.HEAD_CORE_COMMIT,
                    baselineExamples: process.env.BASE_EXAMPLES_COMMIT,
                    headExamples: process.env.HEAD_EXAMPLES_COMMIT,
                    baselineLock: process.env.BASE_EXAMPLES_LOCK_SHA256,
                    headLock: process.env.HEAD_EXAMPLES_LOCK_SHA256,
                    sha256: process.env.EXPECTED_SHA256_BASE64,
                    crc32: process.env.EXPECTED_CRC32_HEX,
                    fileSizeBytes: 1024 * 1024 * 1024,
                    locality: {
                      profile: "observer-topology-exact-manifest-prefix",
                      provisioningMethod: "exact-manifest-head-import",
                      target: 1024,
                      maxOvershoot: 0,
                      indexRows: 0,
                      cohortKey: "observer-persistent-prefix-b1024-i0",
                    },
                    terminalTopology: {
                      baseline: {
                        role: "replicator",
                        replicatorCount: 2,
                        readerSelfInReplicatorSet: true,
                        terminalIndexMode: "full",
                      },
                      head: {
                        role: "observer",
                        replicatorCount: 1,
                        readerSelfInReplicatorSet: false,
                        terminalIndexMode: "empty",
                      },
                    },
                  };
                  const output = path.join(root, "paired-comparison.json");

                  const loadVariant = (variant) => {
                    const name = fs
                      .readdirSync(root)
                      .find((entry) => entry.endsWith("-" + variant + "-summary.json"));
                    if (!name) throw new Error("Missing " + variant + " summary");
                    const summary = JSON.parse(fs.readFileSync(path.join(root, name), "utf8"));
                    const rawResult = summary.results?.[0];
                    const result = rawResult?.browserResult ?? rawResult;
                    if (!result) throw new Error("Missing " + variant + " result");
                    const diagnostics = result.readerDiagnostics?.lastReadDiagnostics;
                    const locality = result.readerLocalityControl;
                    const memoryTelemetry = result.downloadMemoryTelemetry;
                    const hostRss = memoryTelemetry?.hostRss;
                    const expectedTopology = expected.terminalTopology[variant];
                    const issues = [];
                    const check = (condition, message) => {
                      if (!condition) issues.push(message);
                    };
                    check(summary.status === "passed", "summary-status");
                    check(summary.schema?.version === 5, "summary-schema");
                    check(result.schema?.version === 8, "result-schema");
                    check(result.invocation?.schema?.version === 4, "invocation-schema");
                    check(summary.harnessProvenance?.resolvedCommit === expected.harness, "harness-commit");
                    check(summary.harnessProvenance?.dirty === false, "harness-dirty");
                    check(summary.peerbitProvenance?.resolvedCommit === expected[variant], "peerbit-commit");
                    check(summary.peerbitProvenance?.dirty === false, "peerbit-dirty");
                    check(summary.examplesProvenance?.resolvedCommit === expected[variant + "Examples"], "examples-commit");
                    check(summary.examplesProvenance?.lockfileSha256 === expected[variant + "Lock"], "examples-lock");
                    check(result.integrity?.sourceSha256Base64 === expected.sha256, "source-sha256");
                    check(result.integrity?.libraryComputedSha256Base64 === expected.sha256, "library-sha256");
                    check(result.integrity?.manifestSha256Base64 === expected.sha256, "manifest-sha256");
                    check(result.integrity?.sourceCrc32Hex === expected.crc32, "source-crc32");
                    check(result.integrity?.downloadedCrc32Hex === expected.crc32, "download-crc32");
                    check(
                      result.integrity?.expectedSizeBytes === expected.fileSizeBytes &&
                        result.integrity?.sourceSizeBytes === expected.fileSizeBytes &&
                        result.integrity?.manifestSizeBytes === expected.fileSizeBytes &&
                        result.integrity?.downloadedSizeBytes === expected.fileSizeBytes &&
                        result.integrity?.sizeVerified === true &&
                        result.integrity?.sha256Verified === true &&
                        result.integrity?.crc32Verified === true &&
                        result.integrity?.manifestVerified === true &&
                        result.integrity?.verified === true &&
                        result.integrityVerified === true,
                      "integrity-verified",
                    );
                    check(result.errorCount === 0 && result.errorCollectionComplete === true, "errors");
                    check(result.requestFailureCount === 0 && result.requestFailureCollectionComplete === true, "request-failures");
                    check(
                      memoryTelemetry?.profile === "download-memory-v2" &&
                        memoryTelemetry?.complete === true &&
                        memoryTelemetry?.cleanupComplete === true,
                      "memory-telemetry",
                    );
                    check(result.readerLocalityControl?.status === "complete", "locality-control");
                    check(
                      result.readerTerminalTopology === expectedTopology.role &&
                        result.invocation?.readerTerminalTopology === expectedTopology.role &&
                        locality?.expectedTerminalTopology === expectedTopology.role,
                      "terminal-topology-contract",
                    );
                    check(locality?.profile === expected.locality.profile, "locality-profile");
                    check(
                      locality?.provisioningMethod === expected.locality.provisioningMethod,
                      "locality-provisioning",
                    );
                    check(
                      result.invocation?.readerLocalChunkTarget === expected.locality.target &&
                        result.readerLocalChunkTarget === expected.locality.target,
                      "locality-target",
                    );
                    check(
                      result.invocation?.readerLocalChunkMaxOvershoot ===
                          expected.locality.maxOvershoot &&
                        result.readerLocalChunkMaxOvershoot === expected.locality.maxOvershoot &&
                        locality?.requestedLocalChunkBlockCount ===
                          expected.locality.target &&
                        locality?.maxSpeculativeOvershootChunkCount ===
                          expected.locality.maxOvershoot,
                      "locality-max-overshoot",
                    );
                    const localBlockCount = locality?.actualLocalChunkBlockCount;
                    const localIndexRowCount = locality?.actualLocalChunkIndexRowCount;
                    const cohortWithinAllowedRange =
                      Number.isSafeInteger(localBlockCount) &&
                      localBlockCount >= expected.locality.target &&
                      localBlockCount <=
                        expected.locality.target + expected.locality.maxOvershoot;
                    check(cohortWithinAllowedRange, "locality-block-count");
                    check(
                      localIndexRowCount === expected.locality.indexRows,
                      "locality-index-row-count",
                    );
                    check(
                      locality?.speculativeOvershootChunkCount ===
                        localBlockCount - expected.locality.target,
                      "locality-observed-overshoot",
                    );
                    check(
                      result.readerLocalityCohortKey === expected.locality.cohortKey &&
                        locality?.cohortKey === expected.locality.cohortKey,
                      "locality-cohort",
                    );
                    const expectedPrefix = Array.from(
                      { length: expected.locality.target },
                      (_, index) => index,
                    );
                    const preDownload = locality?.preDownloadObservation;
                    check(
                      isDeepStrictEqual(
                        locality?.preloadEvidence?.importedManifestEntryIndices,
                        expectedPrefix,
                      ) &&
                        locality?.preloadEvidence?.requestedManifestEntryCount ===
                          expected.locality.target &&
                        locality?.preloadEvidence?.importedManifestEntryCount ===
                          expected.locality.target &&
                        isDeepStrictEqual(
                          locality?.preloadEvidence?.localManifestEntryIndicesAfter,
                          expectedPrefix,
                      ),
                      "locality-exact-imported-prefix",
                    );
                    check(
                      preDownload?.blockCount === expected.locality.target &&
                        preDownload?.indexRowCount === expected.locality.indexRows &&
                        isDeepStrictEqual(
                          preDownload?.blockChunkIndices,
                          expectedPrefix,
                        ) &&
                        isDeepStrictEqual(preDownload?.indexedChunkIndices, []) &&
                        preDownload?.persistChunkReads === true,
                      "locality-exact-pre-read-prefix",
                    );
                    const terminalIdle = locality?.terminalIdleObservation;
                    const terminalTopologies = locality?.terminalTopologyObservations;
                    const writerPeerDiagnostics = result.writerDiagnostics;
                    const readerPeerDiagnostics = result.readerDiagnostics;
                    const writerPeerHash = locality?.writerTopologyBeforeUpload?.peerHash;
                    const readerPeerHash = locality?.readerTopologyBeforeUpload?.peerHash;
                    const writerSingletonMatches = (writerTopology, readerTopology) =>
                      writerTopology?.peerHash === writerPeerHash &&
                      readerTopology?.peerHash === readerPeerHash &&
                      writerTopology?.replicatorCount === 1 &&
                      readerTopology?.replicatorCount === 1 &&
                      writerTopology?.selfInReplicatorSet === true &&
                      readerTopology?.selfInReplicatorSet === false &&
                      isDeepStrictEqual(writerTopology?.replicatorHashes, [writerPeerHash]) &&
                      isDeepStrictEqual(readerTopology?.replicatorHashes, [writerPeerHash]);
                    check(
                      typeof writerPeerHash === "string" &&
                        typeof readerPeerHash === "string" &&
                        writerPeerHash !== readerPeerHash &&
                        writerSingletonMatches(
                          locality?.writerTopologyBeforeUpload,
                          locality?.readerTopologyBeforeUpload,
                        ) &&
                        writerSingletonMatches(
                          locality?.writerTopologyBeforeTimedRead,
                          locality?.readerTopologyBeforeTimedRead,
                        ),
                      "pre-read-writer-singleton-topology",
                    );
                    const terminalChunkCount = result.readTransfer?.chunkCount;
                    const expectedTerminalIndices = Number.isSafeInteger(terminalChunkCount)
                      ? Array.from({ length: terminalChunkCount }, (_, index) => index)
                      : [];
                    const expectedTerminalIndexedIndices =
                      expectedTopology.terminalIndexMode === "full"
                        ? expectedTerminalIndices
                        : [];
                    check(
                      Number.isSafeInteger(terminalChunkCount) &&
                        terminalChunkCount > expected.locality.target &&
                        terminalIdle?.chunkCount === terminalChunkCount &&
                        terminalIdle?.blockCount === terminalIdle?.chunkCount &&
                        isDeepStrictEqual(
                          terminalIdle?.blockChunkIndices,
                          expectedTerminalIndices,
                        ) &&
                        terminalIdle?.indexRowCount ===
                          expectedTerminalIndexedIndices.length &&
                        isDeepStrictEqual(
                          terminalIdle?.indexedChunkIndices,
                          expectedTerminalIndexedIndices,
                        ) &&
                        terminalIdle?.persistChunkReads === true,
                      "terminal-reader-locality",
                    );
                    const expectedTerminalReplicatorHashes =
                      expectedTopology.role === "replicator"
                        ? [writerPeerHash, readerPeerHash].sort((left, right) =>
                            left.localeCompare(right),
                          )
                        : [writerPeerHash];
                    check(
                      locality?.terminalTopologyRole === expectedTopology.role &&
                        locality?.terminalTopologyExpectationSatisfied === true,
                      "terminal-reader-role",
                    );
                    check(
                      Array.isArray(terminalTopologies) &&
                        terminalTopologies.length === 3 &&
                        terminalTopologies.every(
                          ({ writerTopology, readerTopology }) =>
                            writerTopology?.peerHash === writerPeerHash &&
                            readerTopology?.peerHash === readerPeerHash &&
                            writerTopology?.replicatorCount ===
                              expectedTopology.replicatorCount &&
                            readerTopology?.replicatorCount ===
                              expectedTopology.replicatorCount &&
                            writerTopology?.selfInReplicatorSet === true &&
                            readerTopology?.selfInReplicatorSet ===
                              expectedTopology.readerSelfInReplicatorSet &&
                            isDeepStrictEqual(
                              writerTopology?.replicatorHashes,
                              expectedTerminalReplicatorHashes,
                            ) &&
                            isDeepStrictEqual(
                              readerTopology?.replicatorHashes,
                              expectedTerminalReplicatorHashes,
                            ),
                        ),
                      "terminal-expected-topology",
                    );
                    check(
                      writerPeerDiagnostics?.replicatorCount ===
                          expectedTopology.replicatorCount &&
                        readerPeerDiagnostics?.replicatorCount ===
                          expectedTopology.replicatorCount &&
                        writerPeerDiagnostics?.replicationSetSize === 1 &&
                        readerPeerDiagnostics?.replicationSetSize === 1,
                      "terminal-peer-diagnostics",
                    );
                    check(diagnostics?.chunkManifestEntryPersistenceFailedCount === 0, "persistence-failed");
                    check(diagnostics?.chunkManifestEntryPersistenceMissingIndices?.length === 0, "persistence-missing");
                    check(diagnostics?.chunkManifestEntryContentMismatchIndices?.length === 0, "persistence-content");
                    check(diagnostics?.chunkManifestHeadBatchErrorCount === 0, "manifest-head-batch-errors");
                    check(diagnostics?.chunkManifestHeadBatchInvalidCount === 0, "manifest-head-invalid");
                    if (variant === "head") {
                      check(
                        diagnostics?.chunkManifestHeadBatchMissingCount === 0,
                        "manifest-head-missing",
                      );
                    }
                    check(
                      diagnostics?.chunkManifestHeadPhysicalRemoteRequestErrorCount === 0,
                      "manifest-head-physical-errors",
                    );
                    check(
                      diagnostics?.chunkManifestHeadPhysicalRemoteRequestErrors?.length === 0,
                      "manifest-head-physical-error-details",
                    );
                    if (variant === "head") {
                      check(
                        diagnostics?.chunkManifestHeadPhysicalRemoteRequestCount > 0,
                        "manifest-head-rolling-unused",
                      );
                      check(
                        diagnostics?.maxManifestHeadBatchSize === 1,
                        "manifest-head-physical-width",
                      );
                      check(
                        diagnostics?.maxManifestHeadLogicalWindowSize === 8,
                        "manifest-head-logical-width",
                      );
                    }
                    const boundary = diagnostics?.chunkWriteFinishedAt?.["1023"];
                    const firstHalfMs = boundary - diagnostics?.startedAt;
                    const secondHalfMs = diagnostics?.finishedAt - boundary;
                    const demandValues = Object.values(diagnostics?.chunkDemandWaitMs ?? {});
                    const attempts = Object.values(diagnostics?.chunkAttempts ?? {});
                    const sum = (values) => values.reduce((total, value) => total + value, 0);
                    const firstHalfDemandWaitMs = sum(demandValues.slice(0, 1024));
                    const secondHalfDemandWaitMs = sum(demandValues.slice(1024));
                    const derivedLibraryStreamWallMs =
                      diagnostics?.finishedAt - diagnostics?.startedAt;
                    const fileSizeBytes = result.invocation?.fileSizeBytes;
                    const memoryCounters = [
                      hostRss?.startBrowserBytes,
                      hostRss?.peakBrowserBytes,
                      hostRss?.startCombinedBytes,
                      hostRss?.peakCombinedBytes,
                    ];
                    check(
                      fileSizeBytes === expected.fileSizeBytes &&
                        memoryCounters.every(
                          (value) => Number.isSafeInteger(value) && value >= 0,
                        ) &&
                        hostRss?.peakBrowserBytes >= hostRss?.startBrowserBytes &&
                        hostRss?.peakCombinedBytes >= hostRss?.startCombinedBytes,
                      "memory-rss-counters",
                    );
                    const browserGrowthBytes = Math.max(
                      0,
                      hostRss?.peakBrowserBytes - hostRss?.startBrowserBytes,
                    );
                    const combinedGrowthBytes = Math.max(
                      0,
                      hostRss?.peakCombinedBytes - hostRss?.startCombinedBytes,
                    );
                    const metrics = {
                      libraryStreamWallMs:
                        result.libraryStreamWallMs ?? derivedLibraryStreamWallMs,
                      firstHalfMs,
                      secondHalfMs,
                      demandWaitSumMs:
                        result.readTransfer?.demandWait?.sumMs ?? sum(demandValues),
                      firstHalfDemandWaitMs,
                      secondHalfDemandWaitMs,
                      maxDemandWaitMs:
                        result.readTransfer?.demandWait?.maxMs ?? Math.max(...demandValues),
                      over10sDemandWaitCount:
                        result.readTransfer?.demandWait?.over10sCount ??
                        demandValues.filter((value) => value > 10_000).length,
                      maxChunkAttempts: Math.max(...attempts),
                      startBrowserBytes: hostRss?.startBrowserBytes,
                      peakBrowserBytes: hostRss?.peakBrowserBytes,
                      browserGrowthBytes,
                      browserGrowthOverPayload: browserGrowthBytes / fileSizeBytes,
                      startCombinedBytes: hostRss?.startCombinedBytes,
                      peakCombinedBytes: hostRss?.peakCombinedBytes,
                      combinedGrowthBytes,
                      combinedGrowthOverPayload: combinedGrowthBytes / fileSizeBytes,
                    };
                    check(
                      Object.values(metrics).every(
                        (value) => typeof value === "number" && Number.isFinite(value),
                      ),
                      "metrics",
                    );
                    return {
                      summary,
                      result,
                      issues,
                      metrics,
                      summaryFile: name,
                      cohort: {
                        key: result.readerLocalityCohortKey,
                        blockCount: localBlockCount,
                        indexRowCount: localIndexRowCount,
                      },
                    };
                  };

                  try {
                    const baseline = loadVariant("baseline");
                    const head = loadVariant("head");
                    const pairedIssues = [];
                    const comparableInvocation = ({ readerTerminalTopology, ...invocation }) =>
                      invocation;
                    if (
                      !isDeepStrictEqual(
                        comparableInvocation(baseline.result.invocation),
                        comparableInvocation(head.result.invocation),
                      )
                    ) {
                      pairedIssues.push("invocation-mismatch");
                    }
                    if (!isDeepStrictEqual(baseline.cohort, head.cohort)) {
                      pairedIssues.push("cohort-mismatch");
                    }
                    const delta = {};
                    for (const key of Object.keys(baseline.metrics)) {
                      delta[key] = {
                        baseline: baseline.metrics[key],
                        head: head.metrics[key],
                        delta: head.metrics[key] - baseline.metrics[key],
                        headOverBaseline:
                          baseline.metrics[key] === 0
                            ? null
                            : head.metrics[key] / baseline.metrics[key],
                      };
                    }
                    const comparable =
                      baseline.issues.length === 0 &&
                      head.issues.length === 0 &&
                      pairedIssues.length === 0;
                    const memoryTargetsPassed =
                      head.metrics.browserGrowthOverPayload <= 2.0 &&
                      head.metrics.combinedGrowthOverPayload <= 2.5;
                    const performanceTargetsPassed =
                      head.metrics.over10sDemandWaitCount === 0 &&
                      head.metrics.maxChunkAttempts < 4 &&
                      head.metrics.secondHalfMs <= 46_700 &&
                      head.metrics.secondHalfDemandWaitMs <= 35_500 &&
                      memoryTargetsPassed;
                    const withinNoiseTolerance = (headValue, baselineValue) =>
                      headValue <= Math.max(baselineValue * 1.05, baselineValue + 1_000);
                    const timingRelativeNonRegressionPassed = [
                      "libraryStreamWallMs",
                      "secondHalfMs",
                      "demandWaitSumMs",
                      "secondHalfDemandWaitMs",
                    ].every((key) =>
                      withinNoiseTolerance(head.metrics[key], baseline.metrics[key]),
                    );
                    const memoryGrowthWithinTolerance = (headValue, baselineValue) =>
                      headValue <=
                      Math.max(
                        baselineValue * 1.10,
                        baselineValue + 256 * 1024 * 1024,
                      );
                    const memoryRelativeNonRegressionPassed = [
                      "browserGrowthBytes",
                      "combinedGrowthBytes",
                    ].every((key) =>
                      memoryGrowthWithinTolerance(
                        head.metrics[key],
                        baseline.metrics[key],
                      ),
                    );
                    const relativeNonRegressionPassed =
                      timingRelativeNonRegressionPassed &&
                      memoryRelativeNonRegressionPassed;
                    const report = {
                      schema: { id: "peerbit-file-share-observer-root-persistence-pair", version: 1 },
                      generatedAt: new Date().toISOString(),
                      order: fs.readFileSync(path.join(root, "order.txt"), "utf8").trim().split(/\r?\n/),
                      expected,
                      comparable,
                      memoryTargetsPassed,
                      performanceTargetsPassed,
                      timingRelativeNonRegressionPassed,
                      memoryRelativeNonRegressionPassed,
                      relativeNonRegressionPassed,
                      performanceThresholds: {
                        maxSecondHalfMs: 46_700,
                        maxSecondHalfDemandWaitMs: 35_500,
                        maxOver10sDemandWaitCount: 0,
                        maxChunkAttemptsExclusive: 4,
                        maxBrowserGrowthOverPayload: 2.0,
                        maxCombinedGrowthOverPayload: 2.5,
                        timingRelativeNonRegression:
                          "head <= max(baseline * 1.05, baseline + 1000 ms)",
                        memoryGrowthRelativeNonRegression:
                          "head <= max(baseline * 1.10, baseline + 256 MiB)",
                      },
                      strictGatePassed:
                        comparable &&
                        performanceTargetsPassed &&
                        relativeNonRegressionPassed,
                      pairedIssues,
                      baseline: {
                        summaryFile: baseline.summaryFile,
                        issues: baseline.issues,
                        cohort: baseline.cohort,
                        metrics: baseline.metrics,
                      },
                      head: {
                        summaryFile: head.summaryFile,
                        issues: head.issues,
                        cohort: head.cohort,
                        metrics: head.metrics,
                      },
                      delta,
                    };
                    fs.writeFileSync(output, JSON.stringify(report, null, 2) + "\n");
                    console.log(JSON.stringify(report, null, 2));
                  } catch (error) {
                    const report = {
                      schema: { id: "peerbit-file-share-observer-root-persistence-pair", version: 1 },
                      generatedAt: new Date().toISOString(),
                      comparable: false,
                      performanceTargetsPassed: false,
                      strictGatePassed: false,
                      error: error?.stack ?? String(error),
                    };
                    fs.writeFileSync(output, JSON.stringify(report, null, 2) + "\n");
                    console.error(report.error);
                  }
                  NODE

            - name: Upload paired evidence
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: fileshare-observer-root-persistence-pair-${{ github.run_id }}
                  path: evidence
                  retention-days: 7

            - name: Enforce paired evidence gate
              if: always()
              run: |
                  node --input-type=module <<'NODE'
                  import fs from "node:fs";
                  const root = process.env.RESULTS_ROOT;
                  const report = JSON.parse(
                    fs.readFileSync(root + "/paired-comparison.json", "utf8"),
                  );
                  const runStatus = fs.readFileSync(
                    root + "/overall-run-status.txt",
                    "utf8",
                  ).trim();
                  if (runStatus !== "0" || report.strictGatePassed !== true) {
                    process.exit(1);
                  }
                  NODE
