name: File Share CI

on:
    pull_request:
        paths:
            - ".github/scripts/file-share-pruning-campaign*.mjs"
            - ".github/workflows/file-share-benchmarks.yml"
            - ".github/workflows/file-share-ci.yml"
            - ".github/workflows/file-share-pruning-campaign-combine.yml"
            - ".github/workflows/file-share-two-runner-artifact-benchmarks.yml"
            - ".github/workflows/file-share-two-runner-benchmarks.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "scripts/summarize-file-share-benchmarks*.mjs"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/file-share/**"
    push:
        branches: [master]
        paths:
            - ".github/scripts/file-share-pruning-campaign*.mjs"
            - ".github/workflows/file-share-benchmarks.yml"
            - ".github/workflows/file-share-ci.yml"
            - ".github/workflows/file-share-pruning-campaign-combine.yml"
            - ".github/workflows/file-share-two-runner-artifact-benchmarks.yml"
            - ".github/workflows/file-share-two-runner-benchmarks.yml"
            - "package.json"
            - "pnpm-lock.yaml"
            - "scripts/summarize-file-share-benchmarks*.mjs"
            - "tsconfig.json"
            - "vitest.config.ts"
            - "vitest.setup.ts"
            - "packages/file-share/**"
    workflow_dispatch:

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    correctness:
        name: File-share correctness and offline reopen
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build file-share library
              run: pnpm --filter @peerbit/please-lib run build

            - name: Self-test two-runner integrity
              working-directory: packages/file-share/frontend
              run: node tests/two-runner.bench.mjs self-test

            - name: Test benchmark result validation and reporting
              run: node --test scripts/summarize-file-share-benchmarks.test.mjs

            - name: Test pruning campaign analysis and combination
              run: node --test .github/scripts/file-share-pruning-campaign.test.mjs

            - name: Test file-share library
              run: pnpm --filter @peerbit/please-lib run test

            - name: Test file-share frontend
              run: pnpm --filter file-share run test:unit

            - name: Build file-share frontend
              run: pnpm --filter file-share run build

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium firefox webkit

            - name: Browser-test two-runner file sink
              working-directory: packages/file-share/frontend
              env:
                  PW_TWO_RUNNER_BROWSER_SELF_TEST: "1"
              run: node tests/two-runner.bench.mjs self-test

            - name: Browser-test bounded download sinks
              env:
                  PW_BROWSERS: chromium,firefox,webkit
              run: >-
                  pnpm --filter file-share exec playwright test
                  -c playwright.config.ts
                  tests/download-sink.browser.e2e.spec.ts
                  --workers 1
                  --reporter=line
                  --output "${RUNNER_TEMP}/file-share-download-sinks"

            - name: Browser-test Peerbit OPFS download wiring
              env:
                  PW_BROWSERS: chromium
                  PW_OPFS_FILE_MB: "6"
              run: >-
                  pnpm --filter file-share exec playwright test
                  -c playwright.config.ts
                  tests/download-streamed.local.e2e.spec.ts
                  --project chromium
                  --grep "OPFS when the save picker is unavailable"
                  --workers 1
                  --reporter=line
                  --output "${RUNNER_TEMP}/file-share-opfs-integration"

            - name: Upload bounded-download failure artifacts
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: file-share-download-sinks-${{ github.run_id }}
                  path: |
                      ${{ runner.temp }}/file-share-download-sinks
                      ${{ runner.temp }}/file-share-opfs-integration
                  if-no-files-found: ignore
                  retention-days: 7

            - name: Test persisted offline browser reopen
              env:
                  PW_REOPEN_FILE_MB: "6"
              run: >-
                  pnpm --filter file-share exec playwright test
                  -c playwright.config.ts
                  tests/offline-reopen.local.e2e.spec.ts
                  --project chromium
                  --workers 1
                  --reporter=line
                  --output "${RUNNER_TEMP}/file-share-offline-reopen"

            - name: Upload offline-reopen failure artifacts
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: file-share-offline-reopen-${{ github.run_id }}
                  path: ${{ runner.temp }}/file-share-offline-reopen
                  if-no-files-found: ignore
                  retention-days: 7
