name: File Share Two-Runner Benchmarks

on:
    workflow_dispatch:
        inputs:
            file_mb:
                description: File size in MiB
                required: true
                type: number
                default: 512
            reader_role:
                description: Reader replication role
                required: true
                type: choice
                default: adaptive
                options:
                    - adaptive
                    - observer
            min_upload_mbps:
                description: Fail if upload throughput is below this value (0 disables)
                required: true
                type: number
                default: 0
            min_download_mbps:
                description: Fail if download throughput is below this value (0 disables)
                required: true
                type: number
                default: 0
            listing_timeout_ms:
                description: Timeout for upload/listing waits in milliseconds
                required: true
                type: number
                default: 1800000

permissions:
    contents: read

env:
    FILE_SHARE_BENCHMARK_BASE_URL: https://files.apps.peerbit.org

jobs:
    writer:
        runs-on: ubuntu-22.04
        timeout-minutes: 90
        concurrency:
            group: file-share-two-runner-writer-${{ github.ref_name }}-${{ inputs.file_mb }}
            cancel-in-progress: false
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Self-test two-runner integrity
              working-directory: packages/file-share/frontend
              run: node tests/two-runner.bench.mjs self-test

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Run writer benchmark
              working-directory: packages/file-share/frontend
              env:
                  PW_BASE_URL: ${{ env.FILE_SHARE_BENCHMARK_BASE_URL }}
                  PW_FILE_MB: ${{ inputs.file_mb }}
                  PW_UPLOAD_TIMEOUT_MS: ${{ inputs.listing_timeout_ms }}
                  PW_RESULT_FILE: ${{ github.workspace }}/bench-results/writer.json
              run: |
                  mkdir -p "$GITHUB_WORKSPACE/bench-results"
                  node tests/two-runner.bench.mjs writer

            - name: Upload writer artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: file-share-two-runner-writer-${{ github.run_id }}
                  path: bench-results
                  retention-days: 7

    reader:
        runs-on: ubuntu-22.04
        timeout-minutes: 90
        concurrency:
            group: file-share-two-runner-reader-${{ github.ref_name }}-${{ inputs.file_mb }}
            cancel-in-progress: false
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Self-test two-runner integrity
              working-directory: packages/file-share/frontend
              run: node tests/two-runner.bench.mjs self-test

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Run reader benchmark
              working-directory: packages/file-share/frontend
              env:
                  PW_BASE_URL: ${{ env.FILE_SHARE_BENCHMARK_BASE_URL }}
                  PW_FILE_MB: ${{ inputs.file_mb }}
                  PW_READER_ROLE: ${{ inputs.reader_role }}
                  PW_UPLOAD_TIMEOUT_MS: ${{ inputs.listing_timeout_ms }}
                  PW_RESULT_FILE: ${{ github.workspace }}/bench-results/reader.json
              run: |
                  mkdir -p "$GITHUB_WORKSPACE/bench-results"
                  node tests/two-runner.bench.mjs reader

            - name: Upload reader artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: file-share-two-runner-reader-${{ github.run_id }}
                  path: bench-results
                  retention-days: 7

    summarize:
        runs-on: ubuntu-22.04
        needs:
            - writer
            - reader
        if: always()
        steps:
            - name: Download writer artifacts
              uses: actions/download-artifact@v4
              with:
                  name: file-share-two-runner-writer-${{ github.run_id }}
                  path: writer-results

            - name: Download reader artifacts
              uses: actions/download-artifact@v4
              with:
                  name: file-share-two-runner-reader-${{ github.run_id }}
                  path: reader-results

            - name: Summarize results
              env:
                  BENCH_FILE_MB: ${{ inputs.file_mb }}
                  BENCH_BASE_URL: ${{ env.FILE_SHARE_BENCHMARK_BASE_URL }}
                  BENCH_READER_ROLE: ${{ inputs.reader_role }}
                  BENCH_MIN_UPLOAD_MBPS: ${{ inputs.min_upload_mbps }}
                  BENCH_MIN_DOWNLOAD_MBPS: ${{ inputs.min_download_mbps }}
              run: |
                  node --input-type=commonjs <<'NODE'
                  const fs = require("node:fs");
                  const path = require("node:path");

                  const load = (dir, file) =>
                    JSON.parse(fs.readFileSync(path.join(dir, file), "utf8"));

                  const writer = load("writer-results", "writer.json");
                  const reader = load("reader-results", "reader.json");
                  const expectedSizeBytes = Number(process.env.BENCH_FILE_MB) * 1024 * 1024;
                  const integrityReasons = [];
                  const requireEqual = (label, left, right) => {
                    if (typeof left !== "string" || left.length === 0) {
                      integrityReasons.push(`missing-${label}-left`);
                    } else if (typeof right !== "string" || right.length === 0) {
                      integrityReasons.push(`missing-${label}-right`);
                    } else if (left !== right) {
                      integrityReasons.push(`${label}-mismatch`);
                    }
                  };
                  const requireSize = (label, value) => {
                    if (value !== expectedSizeBytes) {
                      integrityReasons.push(`${label}-size-mismatch`);
                    }
                  };

                  if (!Number.isSafeInteger(expectedSizeBytes)) {
                    integrityReasons.push("invalid-expected-size");
                  }
                  requireSize("writer", writer.sizeBytes);
                  requireSize("writer-source", writer.integrity?.sourceSizeBytes);
                  requireSize("writer-manifest", writer.manifest?.sizeBytes);
                  requireSize("reader", reader.sizeBytes);
                  requireSize("reader-manifest", reader.manifest?.sizeBytes);
                  requireSize("reader-sink", reader.sink?.sizeBytes);
                  requireEqual(
                    "source-writer-manifest-sha256",
                    writer.integrity?.sourceSha256Base64,
                    writer.manifest?.finalHash
                  );
                  requireEqual(
                    "writer-reader-manifest-sha256",
                    writer.manifest?.finalHash,
                    reader.manifest?.finalHash
                  );
                  requireEqual(
                    "source-download-sha256",
                    writer.integrity?.sourceSha256Base64,
                    reader.integrity?.downloadSha256Base64
                  );
                  requireEqual(
                    "writer-reader-source-sha256",
                    writer.integrity?.sourceSha256Base64,
                    reader.integrity?.sourceSha256Base64
                  );
                  requireEqual(
                    "source-download-crc32",
                    writer.integrity?.sourceCrc32Hex,
                    reader.integrity?.downloadCrc32Hex
                  );
                  requireEqual(
                    "writer-reader-source-crc32",
                    writer.integrity?.sourceCrc32Hex,
                    reader.integrity?.sourceCrc32Hex
                  );
                  requireEqual(
                    "writer-reader-program-address",
                    writer.address,
                    reader.address
                  );
                  requireEqual(
                    "writer-reader-file-name",
                    writer.fileName,
                    reader.fileName
                  );
                  requireEqual(
                    "writer-reader-file-id",
                    writer.manifest?.fileId,
                    reader.manifest?.fileId
                  );
                  requireEqual(
                    "writer-reader-writer-peer-hash",
                    writer.cohort?.writerPeerHash,
                    reader.cohort?.writerPeerHash
                  );
                  requireEqual(
                    "writer-reader-fixture-mode",
                    writer.fixture?.mode,
                    reader.fixture?.mode
                  );
                  requireEqual(
                    "writer-reader-fixture-seed",
                    writer.fixture?.seed,
                    reader.fixture?.seed
                  );
                  if (writer.integrity?.integrityVerified !== true) {
                    integrityReasons.push("writer-integrity-not-verified");
                  }
                  if (reader.integrity?.integrityVerified !== true) {
                    integrityReasons.push("reader-integrity-not-verified");
                  }
                  if (writer.cohort?.valid !== true || reader.cohort?.valid !== true) {
                    integrityReasons.push("invalid-runner-cohort");
                  }
                  if (reader.topology?.valid !== true) {
                    integrityReasons.push("invalid-reader-topology");
                  }
                  if (reader.sink?.fileBacked !== true) {
                    integrityReasons.push("reader-sink-not-file-backed");
                  }
                  if (reader.writerEnvelope?.valid !== true) {
                    integrityReasons.push("invalid-writer-envelope");
                  }
                  const integrityValid = integrityReasons.length === 0;

                  const lines = [
                    "# File-share two-runner benchmark",
                    "",
                    `- Base URL: \`${process.env.BENCH_BASE_URL}\``,
                    `- File size: \`${process.env.BENCH_FILE_MB} MiB\``,
                    `- Reader role: \`${process.env.BENCH_READER_ROLE}\``,
                    `- Writer status: \`${writer.status}\``,
                    `- Reader status: \`${reader.status}\``,
                    `- Integrity: \`${integrityValid ? "verified" : `failed (${integrityReasons.join(", ")})`}\``,
                    `- Cohort: \`${reader.cohort?.name || "missing"}\``,
                    `- Reader topology: \`${reader.topology?.valid === true ? "verified" : "invalid"}\``,
                    `- Download sink: \`${reader.sink?.type || "missing"}\``,
                  ];

                  if (writer.status === "passed") {
                    lines.push(
                      `- Upload: \`${(Number(writer.uploadDurationMs) / 1000).toFixed(2)}s\` at \`${Number(writer.uploadMbps).toFixed(2)} Mbps\``
                    );
                  } else {
                    lines.push(`- Writer failure: \`${writer.failure?.message || "unknown"}\``);
                  }

                  if (reader.status === "passed") {
                    lines.push(
                      `- Reader listing wait: \`${(Number(reader.listingWaitMs) / 1000).toFixed(2)}s\``,
                      `- Download: \`${(Number(reader.downloadDurationMs) / 1000).toFixed(2)}s\` at \`${Number(reader.downloadMbps).toFixed(2)} Mbps\``
                    );
                  } else {
                    lines.push(`- Reader failure: \`${reader.failure?.message || "unknown"}\``);
                  }

                  if (process.env.GITHUB_STEP_SUMMARY) {
                    fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
                  } else {
                    console.log(lines.join("\n"));
                  }

                  if (writer.status !== "passed" || reader.status !== "passed") {
                    throw new Error("Two-runner benchmark did not complete successfully");
                  }
                  if (!integrityValid) {
                    throw new Error(
                      `Two-runner integrity validation failed: ${integrityReasons.join(", ")}`
                    );
                  }

                  const minUpload = Number(process.env.BENCH_MIN_UPLOAD_MBPS || "0");
                  const minDownload = Number(process.env.BENCH_MIN_DOWNLOAD_MBPS || "0");

                  if (minUpload > 0 && Number(writer.uploadMbps) < minUpload) {
                    throw new Error(
                      `Upload throughput ${Number(writer.uploadMbps).toFixed(2)} Mbps is below threshold ${minUpload} Mbps`
                    );
                  }
                  if (minDownload > 0 && Number(reader.downloadMbps) < minDownload) {
                    throw new Error(
                      `Download throughput ${Number(reader.downloadMbps).toFixed(2)} Mbps is below threshold ${minDownload} Mbps`
                    );
                  }
                  NODE
