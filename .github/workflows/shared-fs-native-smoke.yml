name: Shared FS Native Smoke

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    linux-fuse:
        name: Linux FUSE native smoke
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24.x"
                  cache-dependency-path: packages/shared-fs/native/go.sum

            - name: Install FUSE
              run: |
                  sudo apt-get update
                  sudo apt-get install -y fuse3 libfuse3-dev
                  sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2
                  sudo modprobe fuse || true
                  if test -e /dev/fuse; then
                    sudo chmod 666 /dev/fuse
                  fi

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build shared-fs packages
              run: pnpm -r --sort --filter @peerbit/shared-fs --filter @peerbit/shared-fs-cli run build

            - name: Install optional native adapter
              run: |
                  native_deps="$RUNNER_TEMP/fuse-native-deps"
                  npm install --prefix "$native_deps" --no-save --package-lock=false fuse-native@2.2.6
                  mkdir -p packages/shared-fs/library/node_modules
                  rm -rf packages/shared-fs/library/node_modules/fuse-native
                  ln -s "$native_deps/node_modules/fuse-native" packages/shared-fs/library/node_modules/fuse-native

            - name: Verify optional native adapter import
              working-directory: packages/shared-fs/library
              run: |
                  node -e "import('fuse-native').then(() => console.log('fuse-native import ok')).catch((error) => { console.error(error); process.exit(1); })"

            - name: Run native mount smoke
              env:
                  PEERBIT_SHARED_FS_NATIVE_SMOKE: "1"
              run: pnpm --filter @peerbit/shared-fs exec vitest run src/__tests__/native-mount.smoke.test.ts

            - name: Build external native adapter
              working-directory: packages/shared-fs/native
              run: go build -tags "native_mount fuse3" -o "$RUNNER_TEMP/peerbit-shared-fs-native" .

            - name: Run external native adapter smoke
              shell: bash
              run: |
                  set -euo pipefail
                  state="$RUNNER_TEMP/pbfs-state"
                  mountpoint="$RUNNER_TEMP/pbfs-mount"
                  log="$RUNNER_TEMP/pbfs-mount.log"
                  mkdir -p "$mountpoint"

                  address="$(node packages/shared-fs/cli/lib/esm/bin.js create --directory "$state" --no-replicate)"
                  node packages/shared-fs/cli/lib/esm/bin.js mount "$address" "$mountpoint" \
                    --directory "$state" \
                    --no-replicate \
                    --native-adapter "$RUNNER_TEMP/peerbit-shared-fs-native" \
                    > "$log" 2>&1 &
                  mount_pid="$!"
                  cleanup() {
                    kill -INT "$mount_pid" >/dev/null 2>&1 || true
                    wait "$mount_pid" >/dev/null 2>&1 || true
                    fusermount -u "$mountpoint" >/dev/null 2>&1 || true
                  }
                  trap cleanup EXIT

                  for _ in {1..60}; do
                    if grep -q "Mounted " "$log"; then
                      break
                    fi
                    if ! kill -0 "$mount_pid" >/dev/null 2>&1; then
                      cat "$log"
                      exit 1
                    fi
                    sleep 1
                  done
                  grep -q "Mounted " "$log" || { cat "$log"; exit 1; }

                  mkdir "$mountpoint/docs"
                  printf "hello external native" > "$mountpoint/docs/hello.txt"
                  test "$(cat "$mountpoint/docs/hello.txt")" = "hello external native"
                  mv "$mountpoint/docs/hello.txt" "$mountpoint/docs/renamed.txt"
                  test "$(cat "$mountpoint/docs/renamed.txt")" = "hello external native"
                  rm "$mountpoint/docs/renamed.txt"
